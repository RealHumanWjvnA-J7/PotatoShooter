<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Basic GLTF FPS Demo</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: monospace; }
  #crosshair {
    position: fixed; top: 50%; left: 50%; width: 6px; height: 6px;
    margin: -3px 0 0 -3px; border-radius: 50%; background: #0f0;
    pointer-events: none; z-index: 10;
  }
  #hud {
    position: fixed; bottom: 10px; left: 10px; color: #0f0;
    font-size: 14px; z-index: 10; white-space: pre; text-shadow: 1px 1px 2px #000;
  }
  #blocker {
    position: fixed; inset: 0; background: transparent;
    z-index: 20; cursor: pointer;
  }
  #scope {
    position: fixed; inset: 0; display: none; z-index: 15; pointer-events: none;
  }
  #scope::before {
    content: ''; position: absolute; inset: 0; background: #000;
    -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 28vh, #000 28.2vh);
    mask: radial-gradient(circle at 50% 50%, transparent 0 28vh, #000 28.2vh);
  }
  #mp-login {
    position: fixed; inset: 0; z-index: 30; background: rgba(0,0,0,0.9);
    color: #0f0; display: flex; align-items: center; justify-content: center;
  }
  #mp-login .box { display: flex; flex-direction: column; gap: 10px; width: 320px; }
  #mp-login input {
    background: #111; border: 1px solid #0f0; color: #0f0; padding: 8px;
    font-family: monospace; font-size: 14px;
  }
  #mp-login button {
    background: #0f0; color: #000; border: none; padding: 10px; font-weight: bold;
    font-family: monospace; cursor: pointer;
  }
  #mp-login .hint { font-size: 11px; opacity: 0.7; margin-top: 5px; text-align: center; }
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="scope"></div>
<div id="hud">Loading...</div>
<div id="blocker"></div>

<div id="mp-login">
  <div class="box">
    <h2 style="text-align: center; margin-bottom: 10px;">GLTF BLOCK ARENA</h2>
    <input type="text" id="mp-name" placeholder="Player Name" value="Player">
    <input type="text" id="mp-url" placeholder="Server URL (ws://...)" value="">
    <button id="mp-connect-btn">Connect & Play Multiplayer</button>
    <div class="hint">Leave URL blank to use Single Player mode.</div>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
