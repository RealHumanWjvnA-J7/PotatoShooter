<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Potato Shooter</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #000; font-family: monospace; }
  #crosshair {
    position: fixed; top: 50%; left: 50%; width: 6px; height: 6px;
    margin: -3px 0 0 -3px; border-radius: 50%; background: #0f0;
    pointer-events: none; z-index: 10;
  }
  #hud {
    position: fixed; bottom: 10px; left: 10px; color: #0f0;
    font-size: 14px; z-index: 10; white-space: pre; text-shadow: 1px 1px 2px #000;
  }
  #blocker {
    position: fixed; inset: 0; background: transparent;
    z-index: 20; cursor: pointer;
  }
  #scope {
    position: fixed; inset: 0; display: none; z-index: 15; pointer-events: none;
  }
  #scope::before {
    content: ''; position: absolute; inset: 0; background: #000;
    -webkit-mask: radial-gradient(circle at 50% 50%, transparent 0 28vh, #000 28.2vh);
    mask: radial-gradient(circle at 50% 50%, transparent 0 28vh, #000 28.2vh);
  }
  #mp-login {
    position: fixed; inset: 0; z-index: 30; background: rgba(0,0,0,0.9);
    color: #0f0; display: flex; align-items: center; justify-content: center;
  }
  #mp-login .box { display: flex; flex-direction: column; gap: 10px; width: 320px; }
  #mp-login input {
    background: #111; border: 1px solid #0f0; color: #0f0; padding: 8px;
    font-family: monospace; font-size: 14px;
  }
  #mp-login button {
    background: #0f0; color: #000; border: none; padding: 10px; font-weight: bold;
    font-family: monospace; cursor: pointer;
  }
  #mp-login .hint { font-size: 11px; opacity: 0.7; }
  #mp-login .error { color: #ff5555; font-size: 12px; min-height: 16px; }
  #mp-login .room-btn {
    background: #111; color: #0f0; border: 1px solid #0f0; text-align: left;
    display: flex; justify-content: space-between; padding: 10px;
  }
  #mp-login .room-btn:hover { background: #0f0; color: #000; }
  #mp-login .tab-row { display: flex; gap: 4px; margin-bottom: 4px; }
  #mp-login .tab-row button {
    flex: 1; background: #111; border: 1px solid #0f0; color: #0f0; padding: 6px;
  }
  #mp-login .tab-row button.active { background: #0f0; color: #000; }

  #loading-screen {
    position: fixed; inset: 0; z-index: 40; color: #0f0;
    background: #000 url('assets/Construction.png') center center / cover no-repeat;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    font-family: monospace;
  }
  #loading-screen::before {
    content: ''; position: absolute; inset: 0; background: rgba(0,0,0,0.55);
  }
  #loading-screen > * { position: relative; z-index: 1; }
  #loading-screen .bar-outer {
    width: 320px; height: 18px; border: 1px solid #0f0; margin-top: 14px;
  }
  #loading-screen .bar-inner {
    height: 100%; width: 0%; background: #0f0; transition: width 0.2s;
  }
  #loading-item {
    margin-top: 8px; font-size: 12px; opacity: 0.85; min-height: 16px;
  }

  #damage-vignette {
    position: fixed; inset: 0; z-index: 12; pointer-events: none;
    box-shadow: inset 0 0 0 0 rgba(255,0,0,0); transition: box-shadow 0.08s;
  }

  #kill-feed {
    position: fixed; top: 12px; right: 12px; z-index: 11; color: #eee;
    font-family: monospace; font-size: 13px; text-align: right;
    text-shadow: 1px 1px 2px #000;
  }
  #kill-feed div { margin-bottom: 4px; opacity: 1; transition: opacity 2s; }

  #coords-display {
    position: fixed; top: 8px; right: 8px; z-index: 11; color: #0f0;
    font-family: monospace; font-size: 11px; text-align: right;
    text-shadow: 1px 1px 2px #000; white-space: pre; display: none;
  }

  #debug-console {
    position: fixed; bottom: 40px; left: 10px; z-index: 13;
    width: 420px; max-height: 240px; overflow-y: auto;
    background: rgba(0,0,0,0.75); border: 1px solid #0f0;
    color: #0f0; font-family: monospace; font-size: 11px;
    padding: 6px 8px; display: none; white-space: pre-wrap;
  }
  #debug-console .line { margin-bottom: 2px; }
  #debug-console .line.dmg { color: #ff5555; }
  #debug-console .line.skip { color: #888; }

  #connection-banner {
    position: fixed; top: 0; left: 0; right: 0; z-index: 50;
    background: #a00; color: #fff; font-family: monospace; font-size: 13px;
    text-align: center; padding: 6px; display: none;
  }

  #loadout-screen {
    position: fixed; inset: 0; z-index: 35; background: rgba(0,0,0,0.92);
    color: #0f0; display: none; align-items: center; justify-content: center;
    font-family: monospace; overflow-y: auto;
  }
  #loadout-screen .panel { width: 640px; max-width: 92vw; padding: 20px 0; }
  #loadout-screen h2 { color: #0ff; margin-bottom: 6px; }
  #loadout-screen .special-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 20px; }
  #loadout-screen .special-card {
    border: 1px solid #0f0; padding: 8px; cursor: pointer; font-size: 12px;
  }
  #loadout-screen .special-card.selected { background: #0f0; color: #000; }
  #loadout-screen .special-card b { display: block; font-size: 14px; }
  #loadout-screen .special-card .sub { opacity: 0.7; font-style: italic; }
  #loadout-screen select {
    background: #111; color: #0f0; border: 1px solid #0f0; padding: 6px; font-family: monospace;
  }
  #loadout-screen .row { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; }
  #loadout-confirm-btn {
    background: #0f0; color: #000; border: none; padding: 12px 24px; font-weight: bold;
    font-family: monospace; cursor: pointer; font-size: 15px; margin-top: 10px;
  }
  #armor-flip-result {
    position: fixed; top: 40%; left: 50%; transform: translate(-50%, -50%);
    z-index: 36; color: #fff; font-family: monospace; font-size: 20px;
    background: rgba(0,0,0,0.8); padding: 16px 24px; border: 1px solid #0f0; display: none;
  }
  #start-line-banner {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
    z-index: 11; color: #ffd; font-family: monospace; font-size: 16px; font-style: italic;
    text-shadow: 1px 1px 3px #000; text-align: center; max-width: 80vw; opacity: 0;
    transition: opacity 1s;
  }

  #match-hud {
    position: fixed; top: 8px; left: 50%; transform: translateX(-50%);
    z-index: 11; color: #0f0; font-family: monospace; font-size: 12px;
    text-align: center; text-shadow: 1px 1px 2px #000; white-space: pre; display: none;
  }

  #vote-screen, #summary-screen {
    position: fixed; inset: 0; z-index: 37; background: rgba(0,0,0,0.92);
    color: #0f0; display: none; align-items: center; justify-content: center;
    font-family: monospace;
  }
  #vote-screen .panel, #summary-screen .panel { width: 480px; max-width: 90vw; }
  #vote-screen h2, #summary-screen h2 { color: #0ff; margin-bottom: 8px; }
  #vote-options { display: flex; flex-direction: column; gap: 8px; }
  .vote-option-btn {
    background: #111; color: #0f0; border: 1px solid #0f0; text-align: left;
    padding: 10px 14px; font-family: monospace; font-size: 14px; cursor: pointer;
  }
  .vote-option-btn:hover { background: #0f0; color: #000; }
  .vote-option-btn.picked { background: #0a3d0a; border-color: #6f6; }
  #vote-timer, #summary-next { margin-top: 14px; opacity: 0.7; font-size: 12px; }
  #summary-reason { opacity: 0.75; font-size: 12px; margin-bottom: 10px; }
  #summary-screen table { width: 100%; border-collapse: collapse; }
  #summary-screen th { text-align: left; border-bottom: 1px solid #555; padding: 4px 12px 4px 0; }
  #summary-screen td { padding: 4px 12px 4px 0; }
</style>
</head>
<body>
<div id="crosshair"></div>
<div id="scope"></div>
<div id="hud">Loading...</div>
<div id="blocker"></div>
<div id="damage-vignette"></div>
<div id="kill-feed"></div>
<div id="coords-display"></div>
<div id="debug-console"></div>
<div id="connection-banner">Connection lost - reconnecting...</div>
<div id="start-line-banner"></div>
<div id="armor-flip-result"></div>
<div id="match-hud"></div>

<div id="vote-screen">
  <div class="panel">
    <h2 id="vote-title">VOTE</h2>
    <div id="vote-options"></div>
    <div id="vote-timer"></div>
  </div>
</div>

<div id="summary-screen">
  <div class="panel">
    <h2>ROUND OVER</h2>
    <div id="summary-reason"></div>
    <table>
      <thead><tr><th>Player</th><th>Kills</th><th>Deaths</th></tr></thead>
      <tbody id="summary-body"></tbody>
    </table>
    <div id="summary-next">Next: mode vote starting soon...</div>
  </div>
</div>

<div id="loadout-screen">
  <div class="panel">
    <h2>CHOOSE YOUR SPECIAL</h2>
    <div class="special-grid" id="special-grid"></div>

    <h2 id="loadout-secondary-label">SECONDARY</h2>
    <div class="row"><select id="loadout-secondary"></select></div>

    <h2 id="loadout-primary-label">PRIMARIES (pick 2)</h2>
    <div class="row">
      <select id="loadout-primary-1"></select>
      <select id="loadout-primary-2"></select>
    </div>

    <div class="row" id="armor-choice-row" style="display:none;">
      <label>
        <input type="checkbox" id="loadout-armor-checkbox">
        Replace Primary 2 with 40 Armor (non-regenerating) instead of a weapon
      </label>
    </div>

    <button id="loadout-confirm-btn">CONFIRM &amp; DROP IN</button>
  </div>
</div>

<div id="loading-screen">
  <div>LOADING POTATOSHOOTER...</div>
  <div class="bar-outer"><div class="bar-inner" id="loading-bar"></div></div>
  <div id="loading-item"></div>
</div>

<div id="mp-login" style="display:none;">
  <div class="box" id="mp-auth-panel">
    <div class="tab-row">
      <button id="mp-tab-login" class="active">LOG IN</button>
      <button id="mp-tab-signup">SIGN UP</button>
    </div>
    <input id="mp-email" type="email" placeholder="Email">
    <input id="mp-password" type="password" placeholder="Password">
    <div class="error" id="mp-auth-error"></div>
    <button id="mp-auth-submit">LOG IN</button>
    <button id="mp-solo-btn" style="background:#333; color:#0f0; border:1px solid #0f0;">PLAY SOLO (no account)</button>
  </div>

  <div class="box" id="mp-room-panel" style="display:none;">
    <div>Welcome, <span id="mp-welcome-name"></span></div>
    <input id="mp-display-name" placeholder="Display name (shown in-game)" maxlength="24">
    <div>Choose a server:</div>
    <div id="mp-room-list"></div>
    <button id="mp-logout-btn" style="background:#333; color:#f55; border:1px solid #f55; margin-top:6px;">LOG OUT</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module" src="./main.js"></script>
</body>
</html>
